<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reaction Trainer - Blink Edition</title>
    
    <style>
        body { background-color: #121212 !important; color: #E0E0E0 !important; margin: 0; }
        .oculto { display: none !important; }
    </style>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="temporizador">1:00</div>
    <div id="conteo-fallos-exterior">Fallos Totales: 0</div>
    <div id="conteo-aciertos">Aciertos: 0</div>

    <div id="main-container" class="oculto">
        <h1>REACTION TEST</h1>
        <div id="conteo-fallos">Fallos: 0</div>
    </div>

    <button id="btn-circulo" class="oculto"></button>

    <div id="modal-inicio-juego">
        <div id="grid-inicio">
            <div class="modal-columna" id="explicacion-columna">
                <p class="columna-titulo">Instrucciones</p>
                <ol>
                    <li>Haz clic en el círculo lo más rápido posible.</li>
                    <li>Si fallas el clic, el fondo parpadeará en rojo.</li>
                </ol>
            </div>
            <div class="modal-columna" id="principal-columna">
                <h2>¿Listo?</h2>
                <button id="btn-iniciar">INICIAR JUEGO</button>
            </div>
            <div class="modal-columna" id="novedades-columna">
                <p class="columna-titulo">Blink Edition</p>
                <ul>
                    <li>Audio Sync Activo</li>
                    <li>Visual Pulse Activo</li>
                </ul>
            </div>
        </div>
    </div>

    <div id="modal-fin-juego" class="oculto">
        <div class="modal-contenido">
            <h2>¡Fin del Juego!</h2>
            <p>Aciertos: <span id="final-aciertos" class="final-score-badge badge-acierto">0</span></p>
            <p>Fallos: <span id="final-fallos" class="final-score-badge badge-fallo">0</span></p>
            <div id="tiempo-reaccion-estimado" class="final-score-badge badge-reaccion">0 ms</div>
            <br>
            <button id="btn-reiniciar">REINTENTAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
